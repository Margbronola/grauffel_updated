name: grauffel
description: "A new Flutter project."

publish_to: 'none'


version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter


  cupertino_icons: ^1.0.8
  flutter_launcher_icons: ^0.14.4
  device_preview: ^1.2.0
  localization: ^2.1.1
  flutter_dotenv: ^6.0.0
  flutter_screenutil: ^5.9.3
  google_fonts: ^6.2.1
  flutter_localizations:
    sdk: flutter
  stacked_services: ^1.6.0
  shared_preferences: ^2.5.3
  http: ^1.3.0
  firebase_messaging: ^16.0.0
  page_transition: ^2.2.1
  awesome_bottom_bar: ^1.2.4
  rxdart: ^0.28.0
  getwidget: ^6.0.0
  url_launcher: ^6.3.1
  cached_network_image: ^3.4.1
  flutter_expanded_tile: ^0.4.0
  shimmer: ^3.0.0
  image_picker: ^1.2.0
  dio: ^5.8.0+1
  flutter_datetime_picker_bdaya: ^3.0.2
  flutter_picker: ^2.1.0
  pull_to_refresh: ^2.0.0
  firebase_auth: ^6.0.1
  fluttertoast: ^8.2.12
  flutter_local_notifications: ^19.1.0
  path_provider: ^2.1.5
  intl: ^0.19.0
  firebase_core: ^4.0.0
  quiver: ^3.2.2
  date_picker_timetable: ^0.0.5
  lazy_load_scrollview: ^1.3.0
  freezed_annotation: ^2.4.4
  flutter_keyboard_visibility: ^6.0.0
  flutter_facebook_auth: ^7.1.2
  # apple_sign_in_safety: ^0.0.6
  # images_picker: ^1.2.11
  animate_icons: ^2.0.0
  file_picker: ^10.3.2
  flutter_camera_overlay_new: ^0.0.1
  sign_in_with_apple: ^7.0.1
  # flutter_camera_overlay: ^0.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0


flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/1024.png"
  remove_alpha_ios: true


flutter:


  uses-material-design: true

  assets:
    - assets/images/
    - lib/i18n/
    - .env
  
  fonts:
    - family: ProductSans
      fonts:
        - asset: assets/fonts/ProductSans-Regular.ttf
        - asset: assets/fonts/ProductSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/ProductSans-Bold.ttf
          weight: 700
